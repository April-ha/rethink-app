name: Build Rethink APK

on:
  workflow_dispatch: # Permet de lancer la compilation manuellement

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive # Important pour Rethink qui peut avoir des dépendances

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease # Ou assembleDebug pour un test rapide

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rethink-apk
          path: app/build/outputs/apk/release/*.apk
